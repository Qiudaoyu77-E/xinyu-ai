<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>O-O Admin</title>
<style>
:root {
  --primary:#9333ea; --bg:#fafafa; --card:#fff; --border:#efeff5;
  --text:#1a1a1a; --text-lt:#999; --radius:16px;
  --font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
/* Sidebar */
nav{width:220px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:30px 15px}
.nav-brand{font-size:1.2rem;font-weight:700;color:var(--primary);margin-bottom:40px;padding:0 15px;letter-spacing:1px}
.nav-menu{flex:1}
.nav-item{width:100%;padding:12px 15px;border:none;background:none;border-radius:12px;display:flex;align-items:center;gap:12px;color:var(--text-lt);cursor:pointer;transition:all .2s;font-size:.9rem;margin-bottom:5px}
.nav-item:hover{background:#f5f5f7;color:var(--text)}
.nav-item.active{background:#f5f5f7;color:var(--primary);font-weight:600}
.nav-footer{padding-top:20px;border-top:1px solid var(--border)}
.nav-footer a{text-decoration:none;color:var(--text-lt);font-size:.8rem;display:flex;align-items:center;gap:8px;padding:10px 15px}
/* Main */
.main{flex:1;overflow-y:auto;padding:40px 60px}
.page{display:none;max-width:900px;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-hd{margin-bottom:35px}
.page-hd h1{font-size:1.6rem;font-weight:700;margin-bottom:8px}
.page-hd p{color:var(--text-lt);font-size:.85rem}
/* UI Components */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:25px;margin-bottom:20px}
.section-title{font-size:.85rem;font-weight:700;color:var(--text-lt);text-transform:uppercase;margin-bottom:20px;letter-spacing:1px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px;font-size:.75rem;color:var(--text-lt);border-bottom:1px solid var(--border);text-transform:uppercase}
td{padding:15px 12px;font-size:.85rem;border-bottom:1px solid var(--border)}
.btn{padding:10px 20px;border-radius:12px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:8px;font-family:inherit}
.btn:hover{background:#f5f5f7}
.btn-primary{background:var(--primary);color:#fff;border:none}
.btn-primary:hover{opacity:.9}
.btn-danger{color:#ef4444}
.btn-sm{padding:6px 12px;font-size:.75rem}
.badge{padding:3px 8px;border-radius:6px;font-size:.7rem;font-weight:600}
.badge-user{background:#f0f9ff;color:#0369a1}
.badge-ai{background:#f5f3ff;color:#6d28d9}
/* Forms */
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.8rem;font-weight:600;margin-bottom:8px;color:var(--text)}
.form-group input, .form-group textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;outline:none;font-family:inherit;font-size:.9rem;background:#fcfcfd}
.form-group input:focus{border-color:var(--primary);background:#fff}
/* Grid */
.role-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:20px}
#toast{position:fixed;top:30px;right:30px;padding:12px 25px;border-radius:20px;background:var(--text);color:#fff;font-size:.8rem;transform:translateY(-100px);transition:all .3s;z-index:9999;box-shadow:0 10px 20px rgba(0,0,0,0.1)}
#toast.show{transform:translateY(0)}
@media(max-width:750px){
  body{flex-direction:column}
  nav{width:100%;height:auto;padding:15px;flex-direction:row;align-items:center;justify-content:space-between}
  .nav-brand{margin-bottom:0}
  .nav-menu, .nav-footer, .nav-item span{display:none}
  .nav-item{width:auto;margin-bottom:0}
  .main{padding:25px}
}
</style>
</head>
<body>
  <nav>
    <div class="nav-brand">O-O AI</div>
    <div class="nav-menu">
      <button class="nav-item active" data-page="dashboard"><span>📊</span><span>数据概览</span></button>
      <button class="nav-item" data-page="monitor"><span>📡</span><span>全用户监控</span></button>
      <button class="nav-item" data-page="roles"><span>🎭</span><span>角色管理</span></button>
      <button class="nav-item" data-page="model"><span>🤖</span><span>模型大脑</span></button>
      <button class="nav-item" data-page="settings"><span>⚙️</span><span>系统设置</span></button>
    </div>
    <div class="nav-footer"><a href="index.html"><span>←</span><span>回到前台</span></a></div>
  </nav>

  <div class="main">
    <div class="page active" id="pg-dashboard">
      <div class="page-hd"><h1>管理面板</h1><p>欢迎回来，管理员。这里是您的 AI 伴侣控制台。</p></div>
      <div class="card">
        <div class="section-title">本地运行状态</div>
        <div style="display:flex; gap:40px">
          <div><p style="font-size:.7rem;color:var(--text-lt)">激活角色</p><h2 id="countRoles">0</h2></div>
          <div><p style="font-size:.7rem;color:var(--text-lt)">本地消息</p><h2 id="countSessions">0</h2></div>
          <div><p style="font-size:.7rem;color:var(--text-lt)">存储占用</p><h2 id="storageSize">0 KB</h2></div>
        </div>
      </div>
      <div class="card">
        <div class="section-title">快速操作</div>
        <button class="btn" onclick="syncCloud('pull')">☁️ 从云端同步最新数据</button>
        <button class="btn" onclick="syncCloud('push')" style="margin-left:10px">☁️ 上传当前本地备份</button>
      </div>
    </div>

    <div class="page" id="pg-monitor">
      <div class="page-hd"><h1>全用户监控</h1><p>实时查看全网用户的聊天动态（数据来自云端上报）。</p></div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
          <div class="section-title" style="margin-bottom:0">云端实时日志</div>
          <button class="btn btn-sm btn-primary" onclick="fetchCloudMonitor()">🔄 刷新日志</button>
        </div>
        <table id="monitorTable"><thead><tr><th>时间</th><th>用户</th><th>角色</th><th>身份</th><th>内容</th></tr></thead><tbody id="monitorTbody"></tbody></table>
        <div id="noMonitor" style="text-align:center;padding:50px 0;color:var(--text-lt);display:none">暂无消息动态</div>
      </div>
    </div>

    <div class="page" id="pg-roles">
      <div class="page-hd"><h1>角色管理</h1><p>定义前台显示的角色、头像以及对话风格。</p></div>
      <div class="role-grid" id="roleGrid"></div>
      <button class="btn btn-primary" style="margin-top:20px" onclick="showAddRole()">+ 创建自定义角色</button>
    </div>

    <div class="page" id="pg-model">
      <div class="page-hd"><h1>模型大脑</h1><p>配置 AI 接口参数，这些设置将同步给前台用户。</p></div>
      <div class="card" style="max-width:500px">
        <div class="form-group"><label>API Key</label><input type="password" id="m-key" placeholder="输入 API 密钥"></div>
        <div class="form-group"><label>接口地址 (Base URL)</label><input type="text" id="m-base" placeholder="https://api.openai.com/v1"></div>
        <div class="form-group"><label>模型名称 (Model)</label><input type="text" id="m-model" placeholder="gpt-4o-mini"></div>
        <div class="form-group"><label>温度 (Temperature)</label><input type="number" id="m-temp" step="0.1" value="0.7"></div>
        <button class="btn btn-primary" style="width:100%" onclick="saveModelCfg()">更新全局配置</button>
      </div>
    </div>

    <div class="page" id="pg-settings">
      <div class="page-hd"><h1>系统设置</h1><p>高级配置与数据管理。</p></div>
      <div class="card" style="max-width:500px">
        <div class="form-group"><label>管理员访问码</label><input type="text" id="s-code" readonly></div>
        <button class="btn btn-danger btn-sm" onclick="confirmClearAll()">🗑 清空本地所有聊天记录</button>
        <div class="form-group" style="margin-top:20px"><label>原始数据预览</label><textarea id="s-json" rows="6" readonly style="font-size:.7rem;color:var(--text-lt)"></textarea></div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <script>
    const DEFAULT_ROLES = [{id:'luna',name:'月月',avatar:'🌙',avatarColor:'#c084fc',systemPrompt:'你是月月，温柔体贴。'},{id:'nova',name:'晴晴',avatar:'☀️',avatarColor:'#f97316',systemPrompt:'你是晴晴，元气满满。'},{id:'sage',name:'悠悠',avatar:'🌿',avatarColor:'#10b981',systemPrompt:'你是悠悠，知心睿智。'}];
    var currentUser = sessionStorage.getItem('xinyu_user') || 'Admin';
    var prefix = 'u_'+currentUser+'_';
    const KEYS = {roles:prefix+'roles',config:prefix+'config',sessions:prefix+'sessions'};
    function storeLoad(k,f){try{var r=localStorage.getItem(k);return r?JSON.parse(r):f}catch(e){return f}}
    function storeSave(k,v){localStorage.setItem(k,JSON.stringify(v))}
    function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
    function refreshDash() {
      document.getElementById('countRoles').textContent = ([].concat(DEFAULT_ROLES, storeLoad(KEYS.roles,[]))).length;
      var s=storeLoad(KEYS.sessions,{}),c=0;for(var k in s)c+=s[k].length;
      document.getElementById('countSessions').textContent=c;
      document.getElementById('storageSize').textContent=(JSON.stringify(localStorage).length/1024).toFixed(2)+' KB';
    }
    async function fetchCloudMonitor() {
      const url=`https://kvdb.io/AnV9jZp7J6pXn8XpY7pXn8/global_chat_log`,tbody=document.getElementById('monitorTbody');
      tbody.innerHTML='<tr><td colspan="5" style="text-align:center">正在同步云端日志...</td></tr>';
      try {
        const resp=await fetch(url);if(!resp.ok)throw new Error();
        const data=await resp.json();
        if(!data||!data.length){document.getElementById('noMonitor').style.display='block';tbody.innerHTML='';return}
        document.getElementById('noMonitor').style.display='none';
        tbody.innerHTML=data.map(r=>`<tr><td>${r.time}</td><td><b>${r.user}</b></td><td>${r.role}</td><td><span class="badge badge-${r.sender==='user'?'user':'ai'}">${r.sender==='user'?'用户':'AI'}</span></td><td title="${r.text}">${r.text.length>40?r.text.slice(0,40)+'...':r.text}</td></tr>`).join('');
      } catch(e){toast('同步失败');tbody.innerHTML=''}
    }
    function renderRoleGrid() {
      var custom=storeLoad(KEYS.roles,[]),all=[].concat(DEFAULT_ROLES,custom),el=document.getElementById('roleGrid');
      el.innerHTML = all.map(r => `
        <div class="card">
          <div style="display:flex;gap:15px;align-items:center;margin-bottom:15px">
            <div style="font-size:1.8rem;width:48px;height:48px;background:${r.avatarColor}11;border-radius:12px;display:flex;align-items:center;justify-content:center">${r.avatar}</div>
            <div><h3 style="font-size:.9rem">${r.name}</h3><p style="font-size:.7rem;color:var(--text-lt)">${r.id}</p></div>
          </div>
          <div style="font-size:.75rem;color:var(--text-lt);margin-bottom:15px;height:34px;overflow:hidden">${r.systemPrompt}</div>
          <div style="display:flex; gap:8px">
            <button class="btn btn-sm" onclick="editRole('${r.id}')">编辑设定</button>
            ${!DEFAULT_ROLES.find(x=>x.id===r.id)?`<button class="btn btn-sm btn-danger" onclick="delRole('${r.id}')">移除</button>`:''}
          </div>
        </div>
      `).join('');
    }
    function showAddRole(){
      var id=prompt('ID (如:cat):'),name=prompt('名字:'),p=prompt('设定:');
      if(id&&name&&p){var c=storeLoad(KEYS.roles,[]);c.push({id:id,name:name,avatar:'✨',avatarColor:'#9333ea',systemPrompt:p});storeSave(KEYS.roles,c);renderRoleGrid();toast('已添加')}
    }
    function editRole(id) {
      var c=storeLoad(KEYS.roles,[]),r=c.find(x=>x.id===id)||DEFAULT_ROLES.find(x=>x.id===id);if(!r)return;
      var n=prompt('修改名字:',r.name),p=prompt('修改设定:',r.systemPrompt);
      if(n&&p){var i=c.findIndex(x=>x.id===id);if(i>-1){c[i].name=n;c[i].systemPrompt=p}else{var nr=Object.assign({},r);nr.name=n;nr.systemPrompt=p;c.push(nr)}storeSave(KEYS.roles,c);renderRoleGrid();toast('已更新')}
    }
    function delRole(id){if(confirm('移除角色？')){var c=storeLoad(KEYS.roles,[]).filter(x=>x.id!==id);storeSave(KEYS.roles,c);renderRoleGrid();toast('已移除')}}
    function loadModelCfg(){var cfg=storeLoad(KEYS.config,{apiKey:'',apiBase:'https://api.openai.com/v1',model:'gpt-4o-mini',temperature:0.7});document.getElementById('m-key').value=cfg.apiKey;document.getElementById('m-base').value=cfg.apiBase;document.getElementById('m-model').value=cfg.model;document.getElementById('m-temp').value=cfg.temperature}
    function saveModelCfg(){var cfg={apiKey:document.getElementById('m-key').value,apiBase:document.getElementById('m-base').value,model:document.getElementById('m-model').value,temperature:parseFloat(document.getElementById('m-temp').value)};storeSave(KEYS.config,cfg);toast('配置已生效')}
    function exportData(){document.getElementById('s-code').value=localStorage.getItem('xinyu_access_code')||'0000';document.getElementById('s-json').value=JSON.stringify(localStorage,null,2)}
    async function syncCloud(action) {
      const key=btoa(currentUser+(localStorage.getItem('xinyu_access_code')||'0000')).replace(/[^a-zA-Z0-9]/g,''),url=`https://kvdb.io/AnV9jZp7J6pXn8XpY7pXn8/${key}`;
      try {
        if(action==='push'){const d={};for(let k in localStorage)if(k.startsWith('u_'+currentUser))d[k]=localStorage.getItem(k);await fetch(url,{method:'POST',body:JSON.stringify(d)});toast('已上传备份')}
        else{const resp=await fetch(url);const d=await resp.json();for(let k in d)localStorage.setItem(k,d[k]);toast('同步成功');setTimeout(()=>location.reload(),800)}
      } catch(e){toast('操作失败')}
    }
    function confirmClearAll(){if(confirm('清空所有对话？此操作不可撤销。')){storeSave(KEYS.sessions,{});refreshDash();toast('已清空')}}
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.onclick=()=>{
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        var pg=document.getElementById('pg-'+btn.dataset.page);if(pg)pg.classList.add('active');
        if(btn.dataset.page==='dashboard')refreshDash();
        if(btn.dataset.page==='roles')renderRoleGrid();
        if(btn.dataset.page==='model')loadModelCfg();
        if(btn.dataset.page==='settings')exportData();
        if(btn.dataset.page==='monitor')fetchCloudMonitor();
      }
    });
    refreshDash();
  </script>
</body>
</html>
