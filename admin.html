<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O-O Admin · 后台管理</title>
<style>
:root {
  --primary: #9333ea;
  --bg: #f8fafc;
  --sidebar: #ffffff;
  --text: #1e293b;
  --text-lt: #64748b;
  --border: #e2e8f0;
  --card: #ffffff;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
/* Sidebar */
nav { width: 240px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; }
.nav-header { padding: 0 24px 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.nav-header h1 { font-size: 1.2rem; color: var(--primary); letter-spacing: 1px; }
.nav-menu { flex: 1; padding: 0 12px; }
.nav-item { width: 100%; padding: 12px 16px; border: none; background: none; border-radius: 8px; display: flex; align-items: center; gap: 12px; color: var(--text-lt); cursor: pointer; transition: all 0.2s; font-size: 0.95rem; margin-bottom: 4px; }
.nav-item:hover { background: #f1f5f9; color: var(--text); }
.nav-item.active { background: #f1f5f9; color: var(--primary); font-weight: 600; }
.nav-item .ic { font-size: 1.1rem; }
.nav-footer { padding: 20px 12px; border-top: 1px solid var(--border); }
.nav-footer a { text-decoration: none; color: var(--text-lt); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; padding: 8px 16px; }

/* Main Content */
.main { flex: 1; overflow-y: auto; padding: 40px; }
.page { display: none; max-width: 1000px; margin: 0 auto; animation: fadeIn 0.3s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.page-hd { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
.page-hd h1 { font-size: 1.5rem; margin-bottom: 8px; }
.page-hd p { color: var(--text-lt); font-size: 0.9rem; }

/* Grid / Cards */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
.card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; }
.stat-card h3 { font-size: 0.8rem; color: var(--text-lt); text-transform: uppercase; margin-bottom: 8px; }
.stat-card .val { font-size: 1.8rem; font-weight: 700; color: var(--primary); }

/* Table */
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
th { text-align: left; padding: 12px; font-size: 0.85rem; color: var(--text-lt); border-bottom: 1px solid var(--border); }
td { padding: 16px 12px; font-size: 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }

/* UI Elements */
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn:hover { background: #f8fafc; }
.btn-primary { background: var(--primary); color: #fff; border: none; }
.btn-primary:hover { opacity: 0.9; }
.btn-danger { color: #ef4444; }
.btn-sm { padding: 4px 10px; font-size: 0.8rem; }
.badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 500; }
.badge-user { background: #dcfce7; color: #166534; }
.badge-ai { background: #fef9c3; color: #854d0e; }

/* Forms */
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; outline: none; font-family: inherit; font-size: 0.9rem; }
.form-group input:focus { border-color: var(--primary); }

/* Toast */
#toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; background: #1e293b; color: #fff; font-size: 0.9rem; transform: translateX(200%); transition: transform 0.3s; z-index: 9999; }
#toast.show { transform: translateX(0); }
</style>
</head>
<body>
  <nav>
    <div class="nav-header"><h1>O-O Admin</h1></div>
    <div class="nav-menu">
      <button class="nav-item active" data-page="dashboard"><span class="ic">📊</span><span>概览</span></button>
      <button class="nav-item" data-page="roles"><span class="ic">🎭</span><span>角色管理</span></button>
      <button class="nav-item" data-page="model"><span class="ic">🤖</span><span>模型配置</span></button>
      <button class="nav-item" data-page="sessions"><span class="ic">💬</span><span>本地对话</span></button>
      <button class="nav-item" data-page="monitor"><span class="ic">📡</span><span>全用户监控</span></button>
      <button class="nav-item" data-page="settings"><span class="ic">⚙️</span><span>系统设置</span></button>
    </div>
    <div class="nav-footer"><a href="index.html"><span>←</span><span>返回前台</span></a></div>
  </nav>

  <div class="main">
    <!-- Dashboard -->
    <div class="page active" id="pg-dashboard">
      <div class="page-hd"><div><h1>管理概览</h1><p>查看系统运行状态</p></div></div>
      <div class="stats-grid">
        <div class="card stat-card"><h3>当前活跃角色</h3><div class="val" id="countRoles">0</div></div>
        <div class="card stat-card"><h3>本地对话总数</h3><div class="val" id="countSessions">0</div></div>
        <div class="card stat-card"><h3>数据占用</h3><div class="val" id="storageSize">0 KB</div></div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:20px; font-size:1rem">快捷操作</h3>
        <div style="display:flex; gap:10px">
          <button class="btn" onclick="syncCloud('pull')">☁️ 从云端同步备份</button>
          <button class="btn" onclick="syncCloud('push')">☁️ 上传当前数据</button>
        </div>
      </div>
    </div>

    <!-- Monitor -->
    <div class="page" id="pg-monitor">
      <div class="page-hd"><div><h1>全用户监控</h1><p>从云端同步查看所有用户的实时聊天动态</p></div><button class="btn btn-primary" onclick="fetchCloudMonitor()">🔄 立即刷新</button></div>
      <div class="card">
        <div style="overflow-x:auto">
          <table style="width:100%"><thead><tr><th>时间</th><th>用户</th><th>角色</th><th>身份</th><th>消息内容</th></tr></thead><tbody id="monitorTbody"></tbody></table>
        </div>
        <div id="noMonitor" style="text-align:center;padding:40px;color:var(--text-lt)">暂无云端数据，等待用户产生对话...</div>
      </div>
    </div>

    <!-- Roles -->
    <div class="page" id="pg-roles">
      <div class="page-hd"><div><h1>角色管理</h1><p>添加或编辑聊天伙伴</p></div><button class="btn btn-primary" onclick="showAddRole()">+ 添加新角色</button></div>
      <div class="card" id="roleGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:20px; border:none; padding:0; background:none">
        <!-- Roles will be injected here -->
      </div>
    </div>

    <!-- Model -->
    <div class="page" id="pg-model">
      <div class="page-hd"><div><h1>模型配置</h1><p>设置全局默认的 AI 接口参数</p></div></div>
      <div class="card" style="max-width:600px">
        <div class="form-group"><label>API Key</label><input type="password" id="m-key" placeholder="sk-..."></div>
        <div class="form-group"><label>Base URL</label><input type="text" id="m-base" placeholder="https://api.openai.com/v1"></div>
        <div class="form-group"><label>模型名称</label><input type="text" id="m-model" placeholder="gpt-4o-mini"></div>
        <div class="form-group"><label>Temperature (0~2)</label><input type="number" id="m-temp" step="0.1" value="0.7"></div>
        <button class="btn btn-primary" onclick="saveModelCfg()">保存全局配置</button>
      </div>
    </div>

    <!-- Sessions -->
    <div class="page" id="pg-sessions">
      <div class="page-hd"><div><h1>本地对话记录</h1><p>查看您当前浏览器中的聊天历史</p></div><button class="btn btn-danger btn-sm" onclick="confirmClearAll()">🗑 清空全部</button></div>
      <div id="sessionList"></div>
    </div>

    <!-- Settings -->
    <div class="page" id="pg-settings">
      <div class="page-hd"><div><h1>系统设置</h1><p>管理员个人偏好与数据导出</p></div></div>
      <div class="card" style="max-width:600px">
        <div class="form-group"><label>管理密码（访问码）</label><input type="text" id="s-code" readonly style="background:#f1f5f9"></div>
        <div class="form-group"><label>数据备份 (JSON)</label><textarea id="s-json" rows="8" readonly style="font-size:0.8rem; background:#f1f5f9; color:#94a3b8"></textarea></div>
        <button class="btn" onclick="exportData()">刷新导出数据</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const DEFAULT_ROLES = [
      { id:'luna', name:'月月', avatar:'🌙', avatarColor:'#c084fc', tag:'温柔闺蜜', systemPrompt:'你是月月，一个温柔体贴的AI闺蜜。' },
      { id:'nova', name:'晴晴', avatar:'☀️', avatarColor:'#f97316', tag:'元气搭子', systemPrompt:'你是晴晴，一个活力满满的AI元气搭子。' },
      { id:'sage', name:'悠悠', avatar:'🌿', avatarColor:'#10b981', tag:'知心姐姐', systemPrompt:'你是悠悠，一个睿智温和的AI知心姐姐。' }
    ];

    var currentUser = sessionStorage.getItem('xinyu_user') || 'default';
    var prefix = 'u_' + currentUser + '_';
    const KEYS = { roles:prefix+'roles', config:prefix+'config', sessions:prefix+'sessions' };

    function storeLoad(k, f) { try { var r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch(e) { return f; } }
    function storeSave(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

    function toast(m) { var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500); }

    function refreshDash() {
      var roles = [].concat(DEFAULT_ROLES, storeLoad(KEYS.roles, []));
      document.getElementById('countRoles').textContent = roles.length;
      var sessions = storeLoad(KEYS.sessions, {});
      var count = 0; for(var k in sessions) count += sessions[k].length;
      document.getElementById('countSessions').textContent = count;
      document.getElementById('storageSize').textContent = (JSON.stringify(localStorage).length / 1024).toFixed(2) + ' KB';
    }

    async function fetchCloudMonitor() {
      const url = `https://kvdb.io/AnV9jZp7J6pXn8XpY7pXn8/global_chat_log`;
      const tbody = document.getElementById('monitorTbody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">正在拉取云端数据...</td></tr>';
      try {
        const resp = await fetch(url);
        if (!resp.ok) throw new Error();
        const data = await resp.json();
        if (!data || !data.length) { document.getElementById('noMonitor').style.display = 'block'; tbody.innerHTML = ''; return; }
        document.getElementById('noMonitor').style.display = 'none';
        tbody.innerHTML = data.map(r => `<tr><td>${r.time}</td><td><b>${r.user}</b></td><td>${r.role}</td><td><span class="badge badge-${r.sender==='user'?'user':'ai'}">${r.sender==='user'?'用户':'AI'}</span></td><td title="${r.text}">${r.text.length > 50 ? r.text.slice(0,50)+'...' : r.text}</td></tr>`).join('');
      } catch (e) { toast('拉取失败，云端暂无数据'); tbody.innerHTML = ''; }
    }

    function renderRoleGrid() {
      var custom = storeLoad(KEYS.roles, []);
      var all = [].concat(DEFAULT_ROLES, custom);
      var el = document.getElementById('roleGrid');
      el.innerHTML = all.map(r => `
        <div class="card">
          <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px">
            <div style="font-size:2rem; width:50px; height:50px; background:${r.avatarColor}11; border-radius:12px; display:flex; align-items:center; justify-content:center">${r.avatar}</div>
            <div><h3 style="font-size:1rem">${r.name}</h3><p style="font-size:0.75rem; color:var(--text-lt)">${r.tag || 'AI角色'}</p></div>
          </div>
          <div style="font-size:0.8rem; color:var(--text-lt); margin-bottom:15px; height:40px; overflow:hidden">${r.systemPrompt.slice(0,50)}...</div>
          <div style="display:flex; gap:8px">
            <button class="btn btn-sm" onclick="editRole('${r.id}')">编辑</button>
            ${!r.id.match(/luna|nova|sage/) ? `<button class="btn btn-sm btn-danger" onclick="delRole('${r.id}')">删除</button>` : ''}
          </div>
        </div>
      `).join('');
    }

    function showAddRole() {
      var id = prompt('给角色起个ID (英文,如: hero):'); if(!id) return;
      var name = prompt('角色名字:'); if(!name) return;
      var promptText = prompt('系统提示词 (角色设定):'); if(!promptText) return;
      var custom = storeLoad(KEYS.roles, []);
      custom.push({ id:id, name:name, avatar:'👤', avatarColor:'#6366f1', tag:'自定义', systemPrompt:promptText });
      storeSave(KEYS.roles, custom);
      renderRoleGrid(); toast('添加成功');
    }

    function editRole(id) {
      var custom = storeLoad(KEYS.roles, []);
      var r = custom.find(x => x.id === id) || DEFAULT_ROLES.find(x => x.id === id);
      if(!r) return;
      var newName = prompt('修改名字:', r.name); if(!newName) return;
      var newPrompt = prompt('修改设定:', r.systemPrompt); if(!newPrompt) return;
      var idx = custom.findIndex(x => x.id === id);
      if(idx > -1) { custom[idx].name = newName; custom[idx].systemPrompt = newPrompt; } 
      else { var newR = Object.assign({}, r); newR.name = newName; newR.systemPrompt = newPrompt; custom.push(newR); }
      storeSave(KEYS.roles, custom);
      renderRoleGrid(); toast('已更新');
    }

    function delRole(id) {
      if(!confirm('确定删除这个自定义角色吗？')) return;
      var custom = storeLoad(KEYS.roles, []);
      custom = custom.filter(x => x.id !== id);
      storeSave(KEYS.roles, custom);
      renderRoleGrid(); toast('已删除');
    }

    function loadModelCfg() {
      var cfg = storeLoad(KEYS.config, {apiKey:'', apiBase:'https://api.openai.com/v1', model:'gpt-4o-mini', temperature:0.7});
      document.getElementById('m-key').value = cfg.apiKey;
      document.getElementById('m-base').value = cfg.apiBase;
      document.getElementById('m-model').value = cfg.model;
      document.getElementById('m-temp').value = cfg.temperature;
    }

    function saveModelCfg() {
      var cfg = {
        apiKey: document.getElementById('m-key').value,
        apiBase: document.getElementById('m-base').value,
        model: document.getElementById('m-model').value,
        temperature: parseFloat(document.getElementById('m-temp').value)
      };
      storeSave(KEYS.config, cfg); toast('配置已保存');
    }

    function exportData() {
      document.getElementById('s-code').value = localStorage.getItem('xinyu_access_code') || '0000';
      document.getElementById('s-json').value = JSON.stringify(localStorage, null, 2);
    }

    async function syncCloud(action) {
      const code = localStorage.getItem('xinyu_access_code') || '0000';
      const key = btoa(currentUser + code).replace(/[^a-zA-Z0-9]/g, '');
      const url = `https://kvdb.io/AnV9jZp7J6pXn8XpY7pXn8/${key}`;
      try {
        if(action==='push'){
          const data = {}; for(let k in localStorage) { if(k.startsWith('u_'+currentUser)) data[k] = localStorage.getItem(k); }
          await fetch(url, {method:'POST', body:JSON.stringify(data)}); toast('云端备份成功');
        } else {
          const resp = await fetch(url); if(!resp.ok) throw new Error();
          const data = await resp.json(); for(let k in data) localStorage.setItem(k, data[k]);
          toast('同步成功，刷新页面生效'); setTimeout(()=>location.reload(), 1000);
        }
      } catch(e){ toast('同步失败'); }
    }

    // Navigation
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        var pg = document.getElementById('pg-'+btn.dataset.page);
        if(pg) pg.classList.add('active');
        if(btn.dataset.page === 'dashboard') refreshDash();
        if(btn.dataset.page === 'roles') renderRoleGrid();
        if(btn.dataset.page === 'model') loadModelCfg();
        if(btn.dataset.page === 'settings') exportData();
        if(btn.dataset.page === 'monitor') fetchCloudMonitor();
      };
    });

    refreshDash();
  </script>
</body>
</html>
