<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
<title>O-O · 1v1 私人专属</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --primary: #8b5cf6;
  --accent: #ec4899;
  --bg: #0f172a;
  --card: rgba(30, 41, 59, 0.7);
  --border: rgba(255, 255, 255, 0.1);
  --text: #f1f5f9;
  --text-lt: #94a3b8;
  --radius: 24px;
  --font: 'Outfit', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
}

html, body {
  height: 100%;
  font-family: var(--font);
  background: radial-gradient(circle at top right, #1e1b4b 0%, #0f172a 100%);
  color: var(--text);
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
}

.app {
  display: flex;
  height: 100%;
  max-width: 1400px;
  margin: 0 auto;
  padding: 20px;
  gap: 20px;
}

/* Sidebar */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 24px;
  background: var(--card);
  backdrop-filter: blur(30px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.logo { display: flex; align-items: center; gap: 10px; }
.logo h1 { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.history-item {
  padding: 14px 16px;
  border-radius: 16px;
  cursor: pointer;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: all 0.2s;
  background: rgba(255,255,255,0.03);
}
.history-item:hover { background: rgba(255,255,255,0.08); }
.history-item.active { background: linear-gradient(135deg, var(--primary), #6d28d9); color: #fff; font-weight: 600; }

/* Chat Area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--card);
  backdrop-filter: blur(30px);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}

.chat-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.02);
}

.menu-btn { display: none; background: rgba(255,255,255,0.1); border: none; padding: 10px; border-radius: 12px; cursor: pointer; color: #fff; }

.role-avatar { width: 44px; height: 44px; font-size: 1.6rem; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
.chat-header-name { font-size: 1.1rem; font-weight: 700; }

.messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
.msg-row { display: flex; align-items: flex-start; gap: 12px; max-width: 85%; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-bubble {
  padding: 14px 18px;
  border-radius: 20px;
  font-size: 1rem;
  line-height: 1.6;
  word-break: break-all;
}
.msg-row.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3); }
.msg-row.ai .msg-bubble { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }

/* Input Bar */
.input-bar { padding: 20px 24px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 12px; }
.input-wrap { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 18px; padding: 10px 16px; }
#msgInput { width: 100%; border: none; outline: none; font-size: 1rem; color: #fff; background: transparent; resize: none; max-height: 150px; font-family: inherit; }

.send-btn { width: 48px; height: 48px; border-radius: 16px; border: none; background: var(--primary); color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
.send-btn:hover { transform: scale(1.05); background: #7c3aed; }

/* Overlays */
.overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
.glass-box { background: rgba(30, 41, 59, 0.8); border: 1px solid var(--border); border-radius: 32px; padding: 40px; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }

.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 0.85rem; font-weight: 700; color: var(--text-lt); padding-left: 4px; }
.field input, .field select { padding: 14px; border: 1px solid var(--border); border-radius: 16px; font-size: 1rem; outline: none; background: rgba(255,255,255,0.05); color: #fff; font-family: inherit; }
.field input:focus { border-color: var(--primary); }

.primary-btn { width: 100%; padding: 16px; border: none; border-radius: 18px; background: var(--primary); color: #fff; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
.primary-btn:hover { filter: brightness(1.1); transform: translateY(-2px); }

#toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #334155; color: #fff; padding: 12px 24px; border-radius: 100px; font-size: 0.9rem; font-weight: 500; transition: 0.4s; z-index: 9999; }
#toast.show { transform: translateX(-50%) translateY(0); }

#mobileNav { display: none; }

@media(max-width: 768px) {
  .app { padding: 0; gap: 0; flex-direction: column; height: 100%; position: relative; }
  .sidebar { 
    position: fixed; 
    left: 0; 
    top: 0; 
    bottom: 0; 
    z-index: 5000; 
    width: 280px; 
    border-radius: 0; 
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    background: #0f172a;
    box-shadow: 10px 0 30px rgba(0,0,0,0.5);
    display: flex; /* 确保 display 不是 none */
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-mask { z-index: 4999 !important; display: none; }
  .chat-area { border: none; border-radius: 0; flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  .menu-btn { display: flex !important; }
  .msg-row { max-width: 95%; }
  
  .messages { flex: 1; padding: 15px; -webkit-overflow-scrolling: touch; }
  .input-bar { 
    padding: 10px 15px; 
    padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
    background: #1e293b;
  }
  .chat-header { height: 60px; padding: 0 15px; }

  #mobileNav {
    display: flex;
    height: 60px;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid var(--border);
    background: #1e293b;
    flex-shrink: 0;
  }
}

/* Admin Panel */
.admin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 3000; }
.admin-box { background: #1e293b; border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; }
.admin-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
.admin-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
.stat-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; }
.stat-val { font-size: 1.2rem; font-weight: 700; color: var(--primary); }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo"><h1>O-O AI</h1></div>
    <div style="flex:1; display:flex; flex-direction:column; min-height:0">
      <div style="font-size:0.75rem; color:var(--text-lt); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin:20px 0 10px">专属记忆</div>

      <div style="margin-top:auto; padding-top:20px; border-top:1px solid var(--border)">

  <main class="chat-area">
    <!-- 手机端顶部常驻导航 (仅在欢迎页显示) -->
    <div id="mobileNav">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>

    </div>

    <div class="chat-header" id="chatHeader" style="display:none">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>

      <div style="flex:1">
        <div class="chat-header-name" id="headerName"></div>
        <div style="font-size:0.75rem; color:#10b981">● 专属连接已建立</div>
      </div>
      <button class="menu-btn" onclick="clearCurrentChat()">🗑</button>
    </div>

    <div class="messages" id="messages" style="display:none"></div>

    <div class="input-bar" id="inputBar" style="display:none">
      <div class="input-wrap"><textarea id="msgInput" rows="1" placeholder="发送私密讯息..."></textarea></div>
      <button class="send-btn" id="sendBtn" onclick="handleSend()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>

    <div id="welcomeView" style="display:flex; flex:1; flex-direction:column; align-items:center; justify-content:center; padding:20px; text-align:center; overflow-y:auto">
      <div style="font-size:3rem; margin-bottom:15px">✨</div>
      <h2>欢迎来到 1v1 私密空间</h2>
      <p style="color:var(--text-lt); max-width:280px; margin-top:10px; font-size:0.9rem">这里是你与专属灵魂的唯一通道。请点击左上角图标开启陪伴。</p>
    </div>
  </main>
</div>

<!-- Login -->
<div class="overlay" id="loginOverlay">
  <div class="glass-box">
    <div style="text-align:center">
      <h2 style="font-size:1.8rem">1v1 私人专属</h2>
      <p style="font-size:0.9rem; color:var(--text-lt); margin-top:8px">输入你的契约凭证以开启陪伴</p>
    </div>
    <div class="field"><label>专属用户名</label><input type="text" id="loginUser" placeholder="输入用户名"></div>
    <div class="field"><label>专属密码</label><input type="password" id="loginPass" placeholder="输入密码"></div>
    <button class="primary-btn" onclick="doLogin()">进入私人空间</button>

</div>

<!-- Settings -->
<div class="overlay" id="settingsOverlay" style="display:none">

    </div>
  </div>
</div>

<!-- Admin Overlay -->
<div class="admin-overlay" id="adminOverlay">

      <h3>God Mode · 系统控制台</h3>

      <button class="primary-btn" onclick="clearAllData()" style="background:#ef4444; margin-bottom:10px">⚠️ 强制清除本地缓存</button>
      <button class="primary-btn" onclick="copySyncKey()" style="background:#334155">复制当前同步 Key</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/** Admin 逻辑 **/
let logoClicks = 0;
document.querySelector('.logo').onclick = () => {
  logoClicks++;
  if (logoClicks === 5) {
    logoClicks = 0;
    showAdmin();
  }
  setTimeout(() => { if(logoClicks>0) logoClicks=0; }, 3000);
};

function showAdmin() {
  document.getElementById('adminOverlay').style.display = 'flex';
  document.getElementById('statUsers').textContent = Object.keys(PRIVATE_REGISTRY).length;
}
function hideAdmin() {
  document.getElementById('adminOverlay').style.display = 'none';
  document.getElementById('adminPass').value = '';
  document.getElementById('adminContent').style.display = 'none';
}
function verifyAdmin() {
  const p = document.getElementById('adminPass').value;
  if (p === 'admin666') {
    document.getElementById('adminContent').style.display = 'block';
    document.getElementById('adminLoginBtn').style.display = 'none';
    showToast('上帝模式已开启');
  } else {
    showToast('口令错误');
  }
}
function clearAllData() {
  if (confirm('危险：这将清空所有用户配置和聊天记录！确定吗？')) {
    localStorage.clear();
    location.reload();
  }
}
function copySyncKey() {
  const key = localStorage.getItem('xinyu_sync_key');
  navigator.clipboard.writeText(key).then(() => showToast('Key 已复制到剪贴板'));
}

/** 核心系统 **/
var currentUser = sessionStorage.getItem('xinyu_user');
var currentRole = null;
var isLoading = false;

function storeLoad(k, f) { try { var r = localStorage.getItem(k); return r ? JSON.parse(r) : f; } catch(e) { return f; } }
function storeSave(k, v) { localStorage.setItem(k, JSON.stringify(v)); }

async function doLogin() {
  try {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const info = PRIVATE_REGISTRY[user];

    if (!user || !pass) return showToast('请输入完整凭证');
    if (!info || info.pass !== pass) return showToast('专属凭证不正确');

    sessionStorage.setItem('xinyu_user', user);
    currentUser = user;
    
    // 修复：使用 Base64 编码的 UTF-8 字符串生成同步 Key，防止中文报错
    const utf8Bytes = encodeURIComponent(user + pass);
    const syncKey = btoa(utf8Bytes).replace(/[^a-zA-Z0-9]/g, '');
    localStorage.setItem('xinyu_sync_key', syncKey);
    
    showToast('专属通道已开启');
    await syncCloud('pull');
    startApp();
  } catch (err) {
    console.error(err);
    showToast('登录异常：' + err.message);
  }
}

function doLogout() { sessionStorage.clear(); location.reload(); }

function startApp() {
  document.getElementById('loginOverlay').style.display = 'none';
  renderHistory();
  const cfg = storeLoad('u_' + currentUser + '_config', null);
  if (!cfg) {
    setTimeout(showSettings, 500);
    showToast('请先配置你的私有 API 接口');
  }
  
  document.getElementById('msgInput').oninput = function() {
    this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 150) + 'px';
  };
  document.getElementById('msgInput').onkeydown = e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
}

function renderHistory() {
  const el = document.getElementById('historyList');
  const roles = PRIVATE_REGISTRY[currentUser].roles;
  el.innerHTML = roles.map(r => `
    <div class="history-item ${currentRole && currentRole.id===r.id?'active':''}" onclick="selectRole('${r.id}')">
      <span>${r.avatar}</span>
      <span>${r.name}</span>
    </div>
  `).join('');
}

function selectRole(id) {
  const r = PRIVATE_REGISTRY[currentUser].roles.find(x => x.id === id);
  if(!r) return;
  currentRole = r;
  
  // 切换显示状态
  document.getElementById('welcomeView').style.display = 'none';
  const mNav = document.getElementById('mobileNav');
  if(mNav) mNav.style.display = 'none';
  
  document.getElementById('chatHeader').style.display = 'flex';
  document.getElementById('messages').style.display = 'flex';
  document.getElementById('inputBar').style.display = 'flex';
  document.getElementById('headerAvatar').textContent = r.avatar;
  document.getElementById('headerName').textContent = r.name;
  
  // 手机端选中后自动收起侧边栏
  const s = document.querySelector('.sidebar');
  if (s.classList.contains('open')) toggleSidebar();
  
  const h = storeLoad('u_'+currentUser+'_sessions_'+id, []);
  if (h.length === 0 && r.opener) {
    saveMessage(id, { sender:'ai', text:r.opener, time:Date.now() });
  }
  renderMessages();
  renderHistory();
}

function renderMessages() {
  if (!currentRole) return;
  const h = storeLoad('u_'+currentUser+'_sessions_'+currentRole.id, []);
  const el = document.getElementById('messages');
  el.innerHTML = h.map(msg => `
    <div class="msg-row ${msg.sender==='user'?'user':'ai'}">
      <div class="msg-bubble">${msg.text.replace(/\n/g,'<br>')}</div>
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

async function handleSend() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  const cfg = storeLoad('u_'+currentUser+'_config', null);
  if (!text || isLoading) return;
  if (!cfg) return showSettings();

  input.value = ''; input.style.height = 'auto';
  isLoading = true; document.getElementById('sendBtn').disabled = true;
  
  saveMessage(currentRole.id, { sender:'user', text:text, time:Date.now() });
  renderMessages();
  
  const el = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="msg-bubble">${currentRole.name} 正在回应...</div>`;
  el.appendChild(row); el.scrollTop = el.scrollHeight;
  
  try {
    const history = storeLoad('u_'+currentUser+'_sessions_'+currentRole.id, []).slice(-12);
    const msgs = [{ role:'system', content:currentRole.systemPrompt }];
    history.forEach(h => msgs.push({ role: h.sender==='user'?'user':'assistant', content:h.text }));
    
    const resp = await fetch(cfg.apiBase.replace(/\/+$/,'') + '/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + cfg.apiKey },
      body: JSON.stringify({ model: cfg.model, messages: msgs, temperature: 0.85 })
    });
    
    if (!resp.ok) throw new Error('API 暂时无法建立连接');
    const json = await resp.json();
    const aiText = json.choices[0].message.content;
    
    row.remove();
    saveMessage(currentRole.id, { sender:'ai', text:aiText, time:Date.now() });
    renderMessages();
    syncCloud('push');
  } catch(err) {
    row.innerHTML = `<div class="msg-bubble" style="color:#f87171">连接中断: ${err.message}</div>`;
  } finally {
    isLoading = false; document.getElementById('sendBtn').disabled = false;
  }
}

function saveMessage(rid, msg) {
  const k = 'u_'+currentUser+'_sessions_'+rid;
  const all = storeLoad(k, []);
  all.push(msg);
  storeSave(k, all);
}

function clearCurrentChat() {
  if (confirm('确定要清除这段私密的记忆吗？')) {
    localStorage.removeItem('u_'+currentUser+'_sessions_'+currentRole.id);
    selectRole(currentRole.id);
    syncCloud('push');
  }
}

/** 设置 **/
function updateBaseUrl() {
  const sel = document.getElementById('set-model');
  const baseInp = document.getElementById('set-base');
  const customInp = document.getElementById('set-model-custom');
  const selectedOption = sel.options[sel.selectedIndex];
  
  if (selectedOption.value === 'custom') {
    customInp.style.display = 'block';
  } else {
    customInp.style.display = 'none';
    if (selectedOption.dataset.url) {
      baseInp.value = selectedOption.dataset.url;
    }
  }
}

function showSettings() {
  document.getElementById('settingsOverlay').style.display = 'flex';
  const cfg = storeLoad('u_'+currentUser+'_config', {});
  const sel = document.getElementById('set-model');
  const customInp = document.getElementById('set-model-custom');
  
  document.getElementById('set-key').value = cfg.apiKey || '';
  document.getElementById('set-base').value = cfg.apiBase || 'https://api.openai.com/v1';
  
  // 恢复选中的模型
  let found = false;
  for (let i = 0; i < sel.options.length; i++) {
    if (sel.options[i].value === cfg.model) {
      sel.selectedIndex = i;
      found = true;
      break;
    }
  }
  
  if (!found && cfg.model) {
    sel.value = 'custom';
    customInp.value = cfg.model;
    customInp.style.display = 'block';
  } else {
    customInp.style.display = 'none';
  }
}

function hideSettings() { document.getElementById('settingsOverlay').style.display = 'none'; }
function saveSettings() {
  const sel = document.getElementById('set-model');
  const customInp = document.getElementById('set-model-custom');
  const finalModel = sel.value === 'custom' ? customInp.value.trim() : sel.value;
  
  const cfg = {
    apiKey: document.getElementById('set-key').value.trim(),
    apiBase: document.getElementById('set-base').value.trim(),
    model: finalModel || 'gpt-4o-mini',
  };
  if (!cfg.apiKey) return showToast('必须填写 模型密码');
  storeSave('u_'+currentUser+'_config', cfg);
  showToast('配置已加密保存');
  hideSettings();
}

/** 同步 **/
async function syncCloud(action) {
  const key = localStorage.getItem('xinyu_sync_key');
  if (!key) return;
  const url = `https://kvdb.io/AnV9jZp7J6pXn8XpY7pXn8/v4_${key}`;
  try {
    if (action === 'push') {
      const data = {};
      for (let k in localStorage) { if (k.startsWith('u_' + currentUser)) data[k] = localStorage.getItem(k); }
      await fetch(url, { method: 'POST', body: JSON.stringify(data) });
    } else {
      const resp = await fetch(url);
      if (resp.ok) {
        const data = await resp.json();
        for (let k in data) localStorage.setItem(k, data[k]);
      }
    }
  } catch (e) {}
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function toggleSidebar() { 
  const s = document.querySelector('.sidebar');
  const m = document.querySelector('.sidebar-mask');
  if (s.classList.contains('open')) {
    s.classList.remove('open'); m.style.display = 'none';
  } else {
    s.classList.add('open'); m.style.display = 'block';
  }
}

if (currentUser && PRIVATE_REGISTRY[currentUser]) startApp();
</script>
