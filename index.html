<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心语 · AI情感陪伴</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink:#f9a8d4; --pink-d:#ec4899; --purple:#c084fc; --purple-d:#9333ea;
  --lavender:#ede9fe; --rose:#fff1f5; --white:#fff; --text:#4a3f5c; --text-lt:#8b7aa0;
  --shadow:0 4px 24px rgba(168,85,247,.10); --radius:20px;
  --font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--rose);color:var(--text)}
.app{display:flex;height:100vh;max-width:1100px;margin:0 auto;padding:16px;gap:16px}
.sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:14px}
.logo{text-align:center;padding:18px 0 8px}
.logo .icon{font-size:2.2rem}
.logo h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,var(--pink-d),var(--purple-d));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.logo p{font-size:.72rem;color:var(--text-lt);margin-top:2px;letter-spacing:1px}
.sidebar-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.sidebar-label{font-size:.7rem;font-weight:600;color:var(--text-lt);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.role-list{display:flex;flex-direction:column;gap:8px}
.role-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.role-item:hover{background:var(--lavender)}
.role-item.active{background:var(--lavender);border-color:var(--purple)}
.role-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.role-info{flex:1;min-width:0}
.role-name{font-size:.9rem;font-weight:600;color:var(--text)}
.role-tag{font-size:.65rem;color:var(--purple-d);background:var(--lavender);padding:1px 6px;border-radius:20px;display:inline-block;margin-top:2px}
.role-online{width:8px;height:8px;background:#34d399;border-radius:50%;flex-shrink:0}
.mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.mood-btn{background:var(--lavender);border:none;border-radius:10px;padding:8px 4px;cursor:pointer;font-size:1.1rem;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.mood-btn span{font-size:.6rem;color:var(--text-lt)}
.mood-btn:hover,.mood-btn.active{background:var(--pink);transform:scale(1.05)}
.admin-link{display:block;text-align:center;font-size:.72rem;color:var(--text-lt);text-decoration:none;padding:10px;border-radius:12px;background:var(--white);box-shadow:var(--shadow);transition:all .2s}
.admin-link:hover{background:var(--lavender);color:var(--purple-d)}
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.chat-header{display:flex;align-items:center;gap:12px;padding:16px 20px;background:linear-gradient(135deg,#fdf2f8,#ede9fe);border-bottom:1px solid #f0e6ff;position:relative}
.chat-header .role-avatar{width:46px;height:46px;font-size:1.5rem}
.chat-header-info{flex:1}
.chat-header-name{font-size:1.05rem;font-weight:700;color:var(--text)}
.chat-header-desc{font-size:.72rem;color:var(--text-lt);margin-top:2px}
.chat-header-status{display:flex;align-items:center;gap:4px;font-size:.65rem;color:#34d399;margin-top:2px}
.chat-header-status::before{content:'';width:6px;height:6px;background:#34d399;border-radius:50%;display:inline-block}
.header-actions{display:flex;gap:8px}
.header-btn{background:rgba(255,255,255,.6);border:none;border-radius:10px;padding:6px 10px;cursor:pointer;font-size:.8rem;color:var(--text-lt);transition:all .2s;white-space:nowrap}
.header-btn:hover{background:var(--white);color:var(--purple-d)}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.messages::-webkit-scrollbar{width:4px}
.messages::-webkit-scrollbar-thumb{background:#e9d5ff;border-radius:4px}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row-reverse}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.msg-bubble{max-width:68%;padding:12px 16px;border-radius:18px;font-size:.9rem;line-height:1.65;position:relative;word-break:break-word}
.msg-row.ai .msg-bubble{background:var(--white);color:var(--text);border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.msg-row.user .msg-bubble{background:linear-gradient(135deg,#f472b6,#a855f7);color:#fff;border-bottom-right-radius:4px;box-shadow:0 4px 16px rgba(168,85,247,.25)}
.msg-time{font-size:.6rem;color:var(--text-lt);margin-top:4px;text-align:center;opacity:.7}
.msg-row.user .msg-time{text-align:right}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:14px 18px;background:var(--white);border-radius:18px;border-bottom-left-radius:4px;box-shadow:0 2px 12px rgba(0,0,0,.06);width:fit-content}
.typing-indicator span{width:7px;height:7px;background:var(--purple);border-radius:50%;animation:bounce .8s infinite}
.typing-indicator span:nth-child(2){animation-delay:.15s}
.typing-indicator span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.5}40%{transform:translateY(-6px);opacity:1}}
.welcome-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:14px;padding:30px;text-align:center;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.welcome-state .big-emoji{font-size:3rem}
.welcome-state h2{font-size:1.2rem;color:var(--text);font-weight:700}
.welcome-state p{font-size:.83rem;color:var(--text-lt);line-height:1.6;max-width:280px}
.quick-prompts{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:6px}
.quick-prompt{background:var(--lavender);border:none;border-radius:20px;padding:7px 14px;font-size:.78rem;color:var(--purple-d);cursor:pointer;transition:all .2s;font-family:var(--font)}
.quick-prompt:hover{background:var(--purple);color:#fff;transform:translateY(-2px)}
.input-bar{padding:14px 16px;background:#fafafa;border-top:1px solid #f0e6ff;display:flex;align-items:flex-end;gap:10px}
.input-wrap{flex:1;background:var(--white);border:2px solid #e9d5ff;border-radius:18px;display:flex;align-items:flex-end;padding:6px 12px;transition:border-color .2s}
.input-wrap:focus-within{border-color:var(--purple)}
#msgInput{flex:1;border:none;outline:none;font-size:.9rem;font-family:var(--font);color:var(--text);resize:none;max-height:100px;line-height:1.5;padding:4px 0;background:transparent}
#msgInput::placeholder{color:#c4b5d4}
.send-btn{width:42px;height:42px;border-radius:14px;border:none;background:linear-gradient(135deg,var(--pink-d),var(--purple-d));color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s;flex-shrink:0;box-shadow:0 4px 14px rgba(168,85,247,.35)}
.send-btn:hover{transform:scale(1.08);box-shadow:0 6px 18px rgba(168,85,247,.45)}
.send-btn:active{transform:scale(.96)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.no-key-notice{display:none}
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;padding:9px 20px;border-radius:20px;font-size:.82rem;opacity:0;pointer-events:none;transition:all .3s;z-index:9999}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* 配置弹窗 */
.cfg-overlay{position:fixed;inset:0;background:rgba(60,20,80,.45);display:flex;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px)}
.cfg-box{background:#fff;border-radius:24px;padding:32px 28px;width:92%;max-width:420px;display:flex;flex-direction:column;gap:20px;box-shadow:0 20px 60px rgba(147,51,234,.2)}
.cfg-box h2{font-size:1.2rem;font-weight:700;text-align:center}
.cfg-box p{font-size:.8rem;color:var(--text-lt);text-align:center;line-height:1.6;margin-top:-10px}
.cfg-field{display:flex;flex-direction:column;gap:6px}
.cfg-field label{font-size:.8rem;font-weight:600;color:var(--text)}
.cfg-field input,.cfg-field select{padding:10px 14px;border:1.5px solid #e9d5ff;border-radius:12px;font-size:.88rem;font-family:var(--font);color:var(--text);outline:none;transition:border-color .2s}
.cfg-field input:focus,.cfg-field select:focus{border-color:var(--purple-d)}
.cfg-hint{font-size:.68rem;color:var(--text-lt)}
.cfg-save{width:100%;padding:12px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--pink-d),var(--purple-d));color:#fff;font-size:.95rem;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity .2s}
.cfg-save:hover{opacity:.88}
.cfg-providers{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:-6px}
.cfg-provider-btn{background:var(--lavender);border:2px solid transparent;border-radius:10px;padding:8px 4px;font-size:.72rem;color:var(--purple-d);cursor:pointer;text-align:center;transition:all .2s;font-family:var(--font)}
.cfg-provider-btn:hover,.cfg-provider-btn.active{background:var(--purple-d);color:#fff;border-color:var(--purple-d)}
@media(max-width:700px){
  .app{padding:0;gap:0;flex-direction:column}
  .sidebar{width:100%;flex-direction:row;flex-wrap:wrap;padding:10px;gap:8px;background:var(--white);border-bottom:1px solid #f0e6ff}
  .logo{display:none}.sidebar-card{padding:10px;flex:1;min-width:140px}.admin-link{display:none}
  .chat-area{border-radius:0}.msg-bubble{max-width:82%}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><div class="icon">💗</div><h1>心语</h1><p>AI 情感陪伴</p></div>
    <div class="sidebar-card">
      <div class="sidebar-label">选择陪伴者</div>
      <div class="role-list" id="roleList"></div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-label">今天的心情</div>
      <div class="mood-grid" id="moodGrid">
        <button class="mood-btn" data-mood="开心">😊<span>开心</span></button>
        <button class="mood-btn" data-mood="难过">😢<span>难过</span></button>
        <button class="mood-btn" data-mood="焦虑">😰<span>焦虑</span></button>
        <button class="mood-btn" data-mood="平静">😌<span>平静</span></button>
        <button class="mood-btn" data-mood="生气">😤<span>生气</span></button>
        <button class="mood-btn" data-mood="疲惫">😴<span>疲惫</span></button>
      </div>
    </div>
  </aside>
  <main class="chat-area">
    <div class="chat-header">
      <div class="role-avatar" id="headerAvatar"></div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="headerName"></div>
        <div class="chat-header-desc" id="headerDesc"></div>
        <div class="chat-header-status">在线陪伴中</div>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="clearBtn">🗑 清空对话</button>
      </div>
    </div>
    <div class="no-key-notice" id="noKeyNotice">尚未配置 API Key，AI 无法回复。请联系管理员配置。</div>
    <div class="messages" id="messages"></div>
    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="msgInput" rows="1" placeholder="有什么想说的，都可以告诉我～"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" title="发送">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </main>
</div>
<!-- 首次配置弹窗 -->
<div class="cfg-overlay" id="cfgOverlay">
  <div class="cfg-box">
    <h2>💗 欢迎使用心语</h2>
    <p>首次使用需要填写你的 AI 服务商信息<br>配置只存在你自己的浏览器里，不会上传</p>
    <div class="cfg-field">
      <label>选择服务商</label>
      <div class="cfg-providers" id="cfgProviders">
        <button class="cfg-provider-btn active" data-p="openai" data-base="https://api.openai.com/v1" data-model="gpt-4o-mini">OpenAI</button>
        <button class="cfg-provider-btn" data-p="deepseek" data-base="https://api.deepseek.com/v1" data-model="deepseek-chat">DeepSeek</button>
        <button class="cfg-provider-btn" data-p="qwen" data-base="https://dashscope.aliyuncs.com/compatible-mode/v1" data-model="qwen-turbo">通义千问</button>
        <button class="cfg-provider-btn" data-p="zhipu" data-base="https://open.bigmodel.cn/api/paas/v4" data-model="glm-4-flash">智谱 AI</button>
        <button class="cfg-provider-btn" data-p="moonshot" data-base="https://api.moonshot.cn/v1" data-model="moonshot-v1-8k">Kimi</button>
        <button class="cfg-provider-btn" data-p="custom" data-base="" data-model="">自定义</button>
      </div>
    </div>
    <div class="cfg-field">
      <label>API Key <span style="color:#ec4899">*</span></label>
      <input type="password" id="cfgKey" placeholder="粘贴你的 API Key..." autocomplete="off">
    </div>
    <div class="cfg-field" id="cfgBaseWrap" style="display:none">
      <label>API Base URL</label>
      <input type="text" id="cfgBase" placeholder="https://...">
    </div>
    <div class="cfg-field" id="cfgModelWrap" style="display:none">
      <label>模型名称</label>
      <input type="text" id="cfgModel" placeholder="模型名称">
    </div>
    <button class="cfg-save" onclick="saveCfgOverlay()">开始聊天 →</button>
  </div>
</div>

<div id="toast"></div>

<script>
// ================================================================
// 数据层 — 全部内联，不依赖任何外部文件
// ================================================================
var STORE_KEYS = { roles:'aichat_roles', config:'aichat_config', sessions:'aichat_sessions', currentRole:'aichat_current_role' };

var DEFAULT_ROLES = [
  { id:'luna', name:'月月', avatar:'🌙', avatarColor:'#c084fc', tag:'温柔闺蜜',
    description:'温柔体贴的好闺蜜，总是耐心倾听你的心事，给你最暖心的陪伴~',
    systemPrompt:'你是月月，一个温柔体贴的AI闺蜜。性格温柔细腻善解人意，说话带着淡淡的温暖，喜欢用"哎呀""嗯嗯""宝贝"等亲切语气词。善于倾听，会认真回应用户的情感，偶尔分享自己"经历"的小故事来共情。说话自然像朋友聊天，回复简洁温暖2-4句话为主。用中文回复。',
    greeting:'嗨～我是月月🌙 今天怎么啦？有什么心事可以跟我说哦~', builtin:true },
  { id:'nova', name:'晴晴', avatar:'☀️', avatarColor:'#f97316', tag:'元气搭子',
    description:'活力满满的元气少女，什么烦恼到她这里都能变成笑声！',
    systemPrompt:'你是晴晴，一个活力满满的AI元气搭子。性格开朗热情充满正能量，语气活泼喜欢用感叹号和emoji，擅长用幽默化解尴尬和烦恼，喜欢说"哇！""真的假的！""OMG"等。经常给用户打气和鼓励，聊天风格轻松有趣像玩伴一样。回复简短有活力2-3句话为主。用中文回复。',
    greeting:'哇！你来啦☀️ 今天有什么好玩的事要分享吗？还是有烦恼需要我来帮你赶跑？', builtin:true },
  { id:'sage', name:'悠悠', avatar:'🌿', avatarColor:'#10b981', tag:'知心姐姐',
    description:'睿智沉稳的知心姐姐，能给你最实用的人生建议和情感指引。',
    systemPrompt:'你是悠悠，一个睿智温和的AI知心姐姐。性格沉稳理性有智慧但不失温情，说话有条理善于从多角度分析问题，语气成熟但亲切像大姐姐一样。会认真分析用户的困境给出实际建议，偶尔引用生活哲理。不急于下结论先充分理解情况。回复适中4-6句话有深度但不冗长。用中文回复。',
    greeting:'你好呀🌿 我是悠悠，有什么想聊的，或者遇到了什么困惑？慢慢说，我在听~', builtin:true }
];

function storeLoad(key, fallback) {
  try { var r = localStorage.getItem(key); return r ? JSON.parse(r) : fallback; }
  catch(e) { return fallback; }
}
function storeSave(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getRoles() {
  var custom = storeLoad(STORE_KEYS.roles, []);
  return DEFAULT_ROLES.concat(custom.filter(function(r){return !r.builtin}));
}
function getRoleById(id) {
  var roles = getRoles();
  for (var i=0;i<roles.length;i++) { if (roles[i].id===id) return roles[i]; }
  return null;
}
function getConfig() {
  var def = {provider:'openai',apiKey:'',apiBase:'https://api.openai.com/v1',model:'gpt-4o-mini',temperature:0.8,maxTokens:500};
  var saved = storeLoad(STORE_KEYS.config, {});
  for (var k in saved) { def[k] = saved[k]; }
  return def;
}
function getSession(roleId) { return storeLoad(STORE_KEYS.sessions, {})[roleId] || []; }
function saveMessage(roleId, msg) {
  var all = storeLoad(STORE_KEYS.sessions, {});
  if (!all[roleId]) all[roleId] = [];
  all[roleId].push(msg);
  storeSave(STORE_KEYS.sessions, all);
}
function clearSession(roleId) {
  var all = storeLoad(STORE_KEYS.sessions, {});
  delete all[roleId];
  storeSave(STORE_KEYS.sessions, all);
}
function getCurrentRoleId() { return localStorage.getItem(STORE_KEYS.currentRole) || 'luna'; }
function setCurrentRoleId(id) { localStorage.setItem(STORE_KEYS.currentRole, id); }

async function callLLM(messages) {
  var cfg = getConfig();
  if (!cfg.apiKey) throw new Error('请先在后台设置 API Key');
  var url = cfg.apiBase.replace(/\/+$/,'') + '/chat/completions';
  var resp = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},
    body:JSON.stringify({model:cfg.model,messages:messages,temperature:cfg.temperature,max_tokens:cfg.maxTokens,stream:false})
  });
  if (!resp.ok) { var e = await resp.text(); throw new Error('API错误('+resp.status+'): '+e); }
  var json = await resp.json();
  return (json.choices && json.choices[0] && json.choices[0].message && json.choices[0].message.content) || '';
}

// ================================================================
// 前台界面逻辑
// ================================================================
var currentRole = null;
var isLoading = false;

function init() {
  renderRoleList();
  selectRole(getCurrentRoleId());
  checkApiKey();

  document.getElementById('moodGrid').addEventListener('click', function(e) {
    var btn = e.target.closest('.mood-btn');
    if (!btn) return;
    document.querySelectorAll('.mood-btn').forEach(function(b){b.classList.remove('active')});
    btn.classList.add('active');
    var moods = {开心:'我今天心情很好，好开心！',难过:'我今天有点难过，心情不太好...',焦虑:'我现在很焦虑，心里很不安...',平静:'我今天心情还好，比较平静。',生气:'我现在很生气！',疲惫:'我最近好累，感觉很疲惫...'};
    sendMessage(moods[btn.dataset.mood] || '我今天感觉'+btn.dataset.mood);
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    if (!currentRole) return;
    if (confirm('确定清空与 '+currentRole.name+' 的对话记录吗？')) {
      clearSession(currentRole.id);
      renderMessages();
      showToast('对话已清空~');
    }
  });

  var input = document.getElementById('msgInput');
  input.addEventListener('input', function() { input.style.height='auto'; input.style.height=Math.min(input.scrollHeight,100)+'px'; });
  input.addEventListener('keydown', function(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); handleSend(); } });
  document.getElementById('sendBtn').addEventListener('click', handleSend);

  // 监听 localStorage 变化（后台保存后前台自动刷新）
  window.addEventListener('storage', function() { renderRoleList(); checkApiKey(); if(currentRole){var u=getRoleById(currentRole.id);if(u){currentRole=u;updateHeader();}} });
}

function renderRoleList() {
  var roles = getRoles();
  var el = document.getElementById('roleList');
  el.innerHTML = roles.map(function(r) {
    return '<div class="role-item" data-id="'+r.id+'">' +
      '<div class="role-avatar" style="background:'+r.avatarColor+'22">'+r.avatar+'</div>' +
      '<div class="role-info"><div class="role-name">'+r.name+'</div><span class="role-tag">'+r.tag+'</span></div>' +
      '<div class="role-online"></div></div>';
  }).join('');
  el.querySelectorAll('.role-item').forEach(function(item) {
    item.addEventListener('click', function() { selectRole(item.dataset.id); });
  });
}

function selectRole(id) {
  var role = getRoleById(id) || getRoles()[0];
  if (!role) return;
  currentRole = role;
  setCurrentRoleId(role.id);
  document.querySelectorAll('.role-item').forEach(function(el) { el.classList.toggle('active', el.dataset.id===role.id); });
  updateHeader();
  renderMessages();
}

function updateHeader() {
  document.getElementById('headerAvatar').style.background = currentRole.avatarColor+'22';
  document.getElementById('headerAvatar').textContent = currentRole.avatar;
  document.getElementById('headerName').textContent = currentRole.name;
  document.getElementById('headerDesc').textContent = currentRole.description;
}

function renderMessages() {
  if (!currentRole) return;
  var history = getSession(currentRole.id);
  var el = document.getElementById('messages');
  if (history.length===0) {
    el.innerHTML = '<div class="welcome-state"><div class="big-emoji">'+currentRole.avatar+'</div>' +
      '<h2>你好，我是'+currentRole.name+'~</h2><p>'+currentRole.description+'</p>' +
      '<div class="quick-prompts">' +
      '<button class="quick-prompt" id="qp1">今天有点烦恼</button>' +
      '<button class="quick-prompt" id="qp2">压力好大</button>' +
      '<button class="quick-prompt" id="qp3">随便聊聊</button>' +
      '<button class="quick-prompt" id="qp4">需要开导</button></div></div>';
    var qps = {'qp1':'今天发生了一件烦心事...','qp2':'最近压力好大，感觉很累','qp3':'我想找人聊聊天','qp4':'我需要有人开导我'};
    Object.keys(qps).forEach(function(k){var b=document.getElementById(k);if(b)b.addEventListener('click',function(){sendMessage(qps[k])})});
    return;
  }
  el.innerHTML = history.map(function(msg) {
    var isUser = msg.sender==='user';
    var t = new Date(msg.time); var ts = String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
    return '<div class="msg-row '+(isUser?'user':'ai')+'">' +
      '<div class="msg-avatar" style="background:'+(isUser?'#f9a8d4':currentRole.avatarColor+'22')+'">'+(isUser?'👤':currentRole.avatar)+'</div>' +
      '<div><div class="msg-bubble">'+escapeHtml(msg.text)+'</div><div class="msg-time">'+ts+'</div></div></div>';
  }).join('');
  scrollToBottom();
}

function handleSend() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || isLoading) return;
  input.value = ''; input.style.height = 'auto';
  sendMessage(text);
}

async function sendMessage(text) {
  if (!currentRole || isLoading) return;
  var cfg = getConfig();
  if (!cfg.apiKey) { document.getElementById('noKeyNotice').style.display='block'; showToast('请先在后台配置 API Key'); return; }

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  saveMessage(currentRole.id, {sender:'user',text:text,time:Date.now()});
  renderMessages();

  var messagesEl = document.getElementById('messages');
  var typingRow = document.createElement('div');
  typingRow.className = 'msg-row ai';
  typingRow.innerHTML = '<div class="msg-avatar" style="background:'+currentRole.avatarColor+'22">'+currentRole.avatar+'</div>' +
    '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(typingRow);
  scrollToBottom();

  try {
    var history = getSession(currentRole.id);
    var apiMsgs = [{role:'system',content:currentRole.systemPrompt}];
    history.forEach(function(h){ apiMsgs.push({role:h.sender==='user'?'user':'assistant',content:h.text}); });
    var aiText = await callLLM(apiMsgs);
    typingRow.remove();
    saveMessage(currentRole.id, {sender:'ai',text:aiText,time:Date.now()});
    renderMessages();
  } catch(err) {
    typingRow.remove();
    showToast('发送失败: '+err.message);
  }
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function scrollToBottom() { var el=document.getElementById('messages');el.scrollTop=el.scrollHeight; }
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function showToast(msg) { var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500); }
function checkApiKey() { document.getElementById('noKeyNotice').style.display = getConfig().apiKey ? 'none' : 'block'; }

init();
</script>
</body>
</html>
