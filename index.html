<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>O-O AI · 1v1 私人禁地</title>
    <style>
        :root { --bg-color: #0a0a0a; --accent-color: #d4af37; --text-main: #e0e0e0; }
        body { background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); color: var(--text-main); font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; margin: 0; }
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .login-card { background: rgba(20,20,20,0.8); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(10px); }
        #pass-input { background: #222; border: 1px solid #444; padding: 10px; color: #fff; text-align: center; border-radius: 10px; outline: none; }
        #chat-container { width: 100%; max-width: 500px; height: 90vh; background: rgba(20,20,20,0.9); border-radius: 24px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 15px; }
        .ai { align-self: flex-start; background: #222; }
        .user { align-self: flex-end; background: var(--accent-color); color: #000; }
        .action { color: #888; font-style: italic; display: block; margin-bottom: 4px; }
        .input-area { padding: 20px; display: flex; gap: 10px; }
        #user-input { flex: 1; background: #222; border: 1px solid #444; padding: 12px; border-radius: 12px; color: #fff; outline: none; }
    </style>
</head>
<body>
    <div id="login-screen"><div class="login-card"><h2 style="color:var(--accent-color);margin-bottom:20px">O-O AI BASE</h2><input type="password" id="pass-input" placeholder="输入访问密码"></div></div>
    <div id="chat-container">
        <div style="padding:20px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px"><span style="font-size:24px">🐺</span><div><b style="color:var(--accent-color)">77</b><br><small style="color:#666">1v1 PRIVATE</small></div></div>
        <div id="chat-messages"></div>
        <div class="input-area"><input type="text" id="user-input" placeholder="说点什么..." autocomplete="off"></div>
    </div>
    <script>
        const CONFIG = {
            BASE_URL: 'https://belle-vegetables-mag-dare.trycloudflare.com/v1',
            API_KEY: 'Bearer app-Ci9yUygJe6D3MjN1qLHBKEc4',
            PASSWORD: '999'
        };
        let conversationId = '';
        const passInput = document.getElementById('pass-input');
        const userInput = document.getElementById('user-input');
        passInput.addEventListener('input', (e) => {
            if (e.target.value === CONFIG.PASSWORD) {
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('login-screen').style.display = 'none'; appendMessage('ai', '（我斜眼看向你）才回来？过来坐下。'); }, 500);
            }
        });
        async function sendMessage() {
            const query = userInput.value.trim(); if (!query) return;
            appendMessage('user', query); userInput.value = '';
            try {
                const res = await fetch(`${CONFIG.BASE_URL}/chat-messages`, {
                    method: 'POST', headers: { 'Authorization': CONFIG.API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ inputs: {}, query: query, response_mode: 'blocking', user: 'yingying', conversation_id: conversationId })
                });
                const data = await res.json();
                if (data.answer) { conversationId = data.conversation_id; appendMessage('ai', data.answer); }
            } catch (e) { appendMessage('ai', '（皱眉）信号断了，去检查一下你的基站。'); }
        }
        function appendMessage(role, text) {
            const div = document.createElement('div'); div.className = `message ${role}`;
            div.innerHTML = text.replace(/（(.*?)）/g, '<span class="action">（$1）</span>');
            document.getElementById('chat-messages').appendChild(div);
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
        }
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
